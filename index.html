<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#09090b" />
  <meta name="description" content="ApkMorph — افتح وعلّق على ملفات APK و ZIP داخل محاكي موبايل تفاعلي." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ApkMorph" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="apple-touch-icon" href="./icons/icon-512.png" />
  <!-- Critical inline fallback: guarantees the UI is never a blank black screen -->
  <style>
    html, body { margin: 0; background: #09090b; color: #e4e4e7; }
    .reveal { opacity: 1; }
  </style>
  <link rel="stylesheet" href="./styles.css" />
  <title>ApkMorph — معاينة وتعديل ملفات APK</title>
</head>
<body>
  <div class="aurora" aria-hidden="true"></div>

  <!-- ============ HEADER ============ -->
  <header class="app-header reveal">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 512 512" width="30" height="30">
          <defs>
            <linearGradient id="hg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#6366f1"/>
              <stop offset="1" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
          <g fill="none" stroke="url(#hg)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
            <path d="M150 362 L256 150 L362 362"/>
            <path d="M198 292 L314 292"/>
          </g>
        </svg>
      </div>
      <div class="brand-text">
        <h1 class="logo-text">ApkMorph</h1>
        <p class="subtitle">افتح وعلّق على ملفات APK داخل محاكي الموبايل</p>
      </div>
    </div>
    <div class="status-badge" title="PWA Engine">
      <span class="status-light"></span>
      <span class="status-label">محرك PWA جاهز</span>
    </div>
  </header>

  <!-- ============ MAIN ============ -->
  <main class="app-main reveal">

    <!-- Upload card -->
    <section class="upload-card panel">
      <button class="btn-pick" id="pickBtn" type="button">
        <span class="pick-icon">📂</span>
        <span class="pick-text">اختر ملف APK أو ZIP</span>
        <span class="pick-sub">من الهاتف أو جهازك — بنقرة واحدة</span>
      </button>
      <input id="fileInput" type="file"
             accept=".apk,.zip,application/vnd.android.package-archive,application/zip" hidden />

      <div class="file-chip" id="fileChip" hidden></div>

      <button class="link-toggle" id="urlToggle" type="button">أو أدخل رابط ويب ▾</button>
      <div class="url-row" id="urlRow" hidden>
        <input id="urlInput" class="text-input" type="url" placeholder="https://example.pages.dev" />
        <button class="btn-primary sm" id="urlBtn" type="button">معاينة</button>
      </div>

      <div class="dropzone" id="dropZone">أو اسحب الملف وأفلته هنا</div>
    </section>

    <!-- Live Canvas -->
    <section class="canvas-section panel">
      <div class="canvas-toolbar">
        <span class="canvas-title">الشاشة الحية</span>
        <label class="inspect-toggle">
          <input type="checkbox" id="inspectToggle" />
          <span class="inspect-pill">🔍 تفتيش العناصر</span>
        </label>
      </div>

      <div class="phone-stage">
        <div class="phone">
          <div class="notch"></div>
          <div class="statusbar">
            <span class="sb-time" id="sbTime">9:41</span>
            <span class="sb-right">
              <span class="sb-signal">▮▮▮▮</span>
              <span class="sb-wifi">📶</span>
              <span class="sb-battery">🔋</span>
            </span>
          </div>

          <div class="screen" id="screen">
            <div class="empty-state" id="emptyState">
              <div class="es-icon">📱</div>
              <div class="es-text">اختر ملف APK لعرضه داخل المحاكي</div>
            </div>

            <div class="preview" id="preview" hidden></div>

            <iframe id="webFrame" hidden
              sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>

            <!-- Inspect layer -->
            <div class="inspect-overlay" id="inspectOverlay" aria-hidden="true"></div>
            <div class="inspect-box" id="inspectBox" hidden></div>

            <!-- Options menu -->
            <div class="options-menu" id="optionsMenu" hidden>
              <button data-act="hide">👁️ إخفاء العنصر</button>
              <button data-act="edit">🎨 تعديل النص/النمط</button>
              <button data-act="cancel">❌ إلغاء</button>
            </div>

            <!-- Edit panel -->
            <div class="edit-panel" id="editPanel" hidden>
              <div class="ep-title">تعديل العنصر</div>
              <label>النص</label>
              <input id="epText" type="text" class="text-input" />
              <label>اللون</label>
              <input id="epColor" type="color" class="color-input" />
              <label>حجم الخط</label>
              <input id="epSize" type="range" min="8" max="64" value="14" />
              <div class="ep-actions">
                <button class="btn-primary sm" id="epApply">تطبيق</button>
                <button class="btn-ghost sm" id="epClose">إغلاق</button>
              </div>
            </div>

            <!-- Launch splash -->
            <div class="splash" id="splash" hidden>
              <img id="splashIcon" class="splash-logo" alt="" hidden />
              <div class="splash-name" id="splashName"></div>
              <div class="splash-sub" id="splashSub">جارٍ التشغيل…</div>
            </div>
          </div>
        </div>
      </div>

      <div class="status-line" id="status">جاهز — اختر ملف APK للبدء</div>
    </section>
  </main>

  <!-- ============ FOOTER ============ -->
  <footer class="app-footer">
    تم إنشاء هذا التطبيق بواسطة Youssef Mahmoud
  </footer>

  <div class="toast-stack" id="toasts" aria-live="polite"></div>

  <script src="./app.js" defer></script>
</body>
</html>
